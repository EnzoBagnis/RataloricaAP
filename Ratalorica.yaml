# Q. What is this file?
# A. This file contains options which allow you to configure your multiworld experience while allowing
#    others to play how they want as well.
#
# Q. How do I use it?
# A. The options in this file are weighted. This means the higher number you assign to a value, the
#    more chances that option will be chosen. For example, an option like this:
#
#    map_shuffle:
#      on: 5
#      off: 15
#
#    means that map shuffle will be off 75% of the time, and on 25% of the time.
#
# Q. I've never seen a file like this before. What characters am I allowed to use?
# A. This is a .yaml file. You are allowed to use most characters.
#    To test if your yaml is valid or not, you can use this website: http://www.yamllint.com/
#    A simple way to make sure your yaml is valid is to ensure none of your lines contains a : without
#    something after it, and that no line begins with a @ character.

# Your name in-game. Spaces will be replaced with underscores and there is a 16-character limit.
# {player} will be replaced with the player's slot number.
# {PLAYER} will be replaced with the player's slot number, if that slot number is greater than 1.
# {number} will be replaced with the counter value of the name.
# {NUMBER} will be replaced with the counter value of the name, if the counter value is greater than 1.
name: SkyRat

# Used to describe your yaml. Useful if you have multiple files.
description: Default Ratalorica Template

game: Ratalorica
requires:
  version: 0.5.0 # Version of Archipelago required for this yaml to work as expected.

Ratalorica:
  # Number of times each upgrade purchase sends a check before working normally.
  # With 1, each upgrade sends 1 check (first purchase only).
  # With 3, each upgrade sends 3 checks (first 3 purchases are blocked, effect comes from AP).
  # Higher values = more locations = more filler items in the pool.
  # Range: 1 to 10
  checks_per_upgrade: 1

  # Generic options (common to every game) ───────────────────────────────────

  # A system to reduce situations where you have nothing to do.
  # Higher values guarantee progression items earlier.
  progression_balancing:
    random: 0
    random-low: 0
    random-high: 0
    disabled: 0    # equivalent to 0
    normal: 50     # equivalent to 50
    extreme: 0     # equivalent to 99

  # Set rules for reachability of your items/locations.
  # - Full: ensure everything can be reached and acquired.
  # - Minimal: ensure what is needed to reach your goal can be acquired.
  accessibility:
    full: 50
    minimal: 0

  # Start with these items.
  start_inventory: {}

  # Start with these item's pickup hints.
  start_hints: []

  # Start with these location's item hints.
  start_location_hints: []

  # Prevent these locations from having an important item.
  exclude_locations: []

  # Prioritize these locations.
  priority_locations: []

  # Forbid certain items from being in your world.
  non_local_items: []

  # Force certain items to be in your world (only your own items).
  local_items: []

  # Share these items between players.
  item_links: []
